# ── Paths ──────────────────────────────────────────────────────────────
data:
  raw_dir: "data/raw/OTU_2d"
  images_subdir: "images"
  masks_subdir: "annotations"
  metadata_file: "label.csv"          # or null to auto-discover
  splits_csv: "results/splits.csv"
  image_size: 224

# ── Experiment ─────────────────────────────────────────────────────────
experiment:
  run_name: "exp_001"
  random_seed: 42
  device: "auto"                        # "auto", "cuda", "cpu"
  use_amp: true                         # Mixed precision training

# ── Training ───────────────────────────────────────────────────────────
training:
  models_to_train:
    - "densenet121"
    - "resnet50"
    - "efficientnet_b3"
    - "mobilenet_v3_large"
    - "swin_t"
  num_classes: 8
  batch_size: 32
  num_epochs: 60
  warmup_epochs: 5
  freeze_epochs: 5
  dropout: 0.5
  lr_backbone: 0.0001
  lr_head: 0.001
  weight_decay: 0.0001
  loss_fn: "weighted_ce"               # "weighted_ce" or "focal"
  focal_gamma: 2.0
  label_smoothing: 0.1
  early_stopping_patience: 15
  early_stopping_metric: "macro_f1"

# ── Gradient Safety ────────────────────────────────────────────────────
gradient:
  clip_value: 1.0
  explosion_threshold: 10.0
  skip_threshold: 100.0

# ── XAI ────────────────────────────────────────────────────────────────
xai:
  cam_thresholds: [0.5, 0.6, 0.7, 0.8, 0.9]
  cam_methods: ["gradcam", "gradcam_pp", "scorecam", "eigencam"]
  gradient_methods: ["saliency", "integrated_gradients"]
  run_shap: false
  shap_n_background: 100
  run_faithfulness: true               # Insertion/Deletion AUC
  faithfulness_n_steps: 50
  save_viz: true
  viz_n_samples: 50                    # How many sample images to visualize

# ── Evaluation ─────────────────────────────────────────────────────────
evaluation:
  screening:
    sc_thresholds: [0.1, 0.15, 0.2, 0.25, 0.3]
    cc_thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]
  statistical:
    significance_level: 0.05

# ── Output ─────────────────────────────────────────────────────────────
output:
  results_dir: "results"
  checkpoints_dir: "results/checkpoints"
  logs_dir: "results/logs"
  figures_dir: "results/figures"
  xai_results_dir: "results/xai"
  viz_dir: "results/visualizations"
